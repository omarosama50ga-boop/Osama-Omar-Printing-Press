<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطبعة الإسراء - آلة حاسبة ديناميكية</title>
    <style>
        /* الأنماط الأساسية */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #1e3a8a 100%); 
            color: white; 
            min-height: 100vh; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            overflow-x: hidden;
            font-size: 18px;
        }
        
        .container { 
            max-width: 1000px; 
            width: 100%; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            margin: 10px 0;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 25px; 
            background: linear-gradient(45deg, #1e3a8a, #3b82f6, #1e40af); 
            border-radius: 15px; 
            animation: glow 3s infinite alternate; 
        }
        
        @keyframes glow { 
            0% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); } 
            100% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); } 
        }
        
        .header h1 { 
            font-size: 2.5rem;
            font-weight: bold; 
            color: white; 
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); 
            line-height: 1.3;
        }
        
        .section { 
            margin-bottom: 25px; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }
        
        .section-title { 
            color: #3b82f6; 
            font-size: 1.8rem;
            margin-bottom: 20px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 2px solid #3b82f6; 
            padding-bottom: 8px; 
        }
        
        .input-group { 
            margin-bottom: 20px; 
        }
        
        .input-group label { 
            display: block; 
            margin-bottom: 12px;
            color: #93c5fd; 
            font-weight: bold; 
            font-size: 1.3rem;
        }
        
        .input-field, .select-field { 
            width: 100%; 
            padding: 18px;
            border: 2px solid #3b82f6; 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            font-size: 1.2rem;
            transition: all 0.3s ease; 
        }
        
        .input-field:focus, .select-field:focus { 
            outline: none; 
            border-color: #ff6b6b; 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(1.02); 
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3); 
        }
        
        .btn { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
            color: white; 
            border: none; 
            padding: 20px;
            border-radius: 10px; 
            font-size: 1.4rem;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3); 
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5); 
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b); 
        }
        
        .result { 
            margin-top: 25px; 
            padding: 20px; 
            background: rgba(59, 130, 246, 0.2); 
            border-radius: 12px; 
            border-left: 4px solid #3b82f6; 
        }
        
        .result h3 { 
            color: #93c5fd; 
            margin-bottom: 12px; 
            font-size: 1.5rem;
            text-align: center; 
        }
        
        .result-value { 
            font-size: 2.5rem;
            font-weight: bold; 
            color: #ff6b6b; 
            text-align: center; 
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); 
            word-break: break-word;
        }
        
        .formula-display { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 12px; 
            text-align: center; 
            color: #93c5fd; 
            font-size: 1.1rem;
            word-break: break-word;
        }

        /* أنماط القسم الجديد لإدارة المعادلات */
        .add-formula-form { 
            padding: 15px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 12px; 
            margin-bottom: 25px; 
        }
        
        .add-btn { 
            background: linear-gradient(45deg, #28a745, #218838); 
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); 
        }
        
        .add-btn:hover { 
            background: linear-gradient(45deg, #218838, #28a745); 
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.5); 
        }
        
        .sub-title { 
            text-align: center; 
            color: #93c5fd; 
            font-size: 1.5rem;
            margin-bottom: 15px; 
        }
        
        /* أنماط المعادلات المحفوظة - الشكل الأصلي */
        .formula-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin: 20px 0; 
            justify-content: center;
        }
        
        .formula-btn { 
            background: linear-gradient(45deg, #3b82f6, #1e40af); 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-size: 1.3rem;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); 
            padding: 15px 25px;
            min-width: 120px;
        }
        
        .formula-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5); 
            background: linear-gradient(45deg, #1e40af, #3b82f6); 
        }
        
        .formula-btn.selected { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
        }

        /* أنماط أزرار عدد الفورم (معدل) */
        .form-count-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
            align-items: center;
            justify-content: center;
        }

        .form-count-btn, .no-form-btn {
            background: linear-gradient(45deg, #6c757d, #495057);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
            padding: 12px 20px;
            min-width: 60px;
            flex: 1 0 auto;
            max-width: 80px;
        }

        .no-form-btn {
            background: linear-gradient(45deg, #28a745, #218838);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            max-width: 120px;
            flex: 0 0 auto;
        }

        .no-form-btn:hover {
            background: linear-gradient(45deg, #218838, #28a745);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.5);
            transform: translateY(-2px);
        }

        .form-count-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.5);
            background: linear-gradient(45deg, #495057, #6c757d);
        }

        .form-count-btn.selected-form, .no-form-btn.selected-form {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        /* أنماط قسم إدارة أنواع الورق */
        .paper-types-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px; 
            margin-top: 15px; 
        }
        
        .paper-type-card { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            padding: 18px;
            text-align: center; 
            position: relative; 
            border: 2px solid #3b82f6; 
            transition: all 0.3s ease; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
        }
        
        .paper-type-card:hover { 
            transform: translateY(-3px); 
            border-color: #ff6b6b; 
            box-shadow: 0 8px 15px rgba(255, 107, 107, 0.3); 
        }
        
        .paper-name { 
            font-weight: bold; 
            margin-bottom: 8px; 
            font-size: 1.4rem;
            color: white; 
        }
        
        .paper-price { 
            color: #ff6b6b; 
            font-weight: bold; 
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        
        .paper-actions { 
            display: flex; 
            justify-content: space-between; 
            gap: 8px;
        }
        
        .paper-action-btn { 
            padding: 10px 15px;
            border-radius: 5px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease; 
            font-size: 1rem;
            flex: 1;
        }
        
        .edit-btn { 
            background: #3b82f6; 
            color: white; 
        }
        
        .edit-btn:hover { 
            background: #1e40af; 
        }
        
        .delete-paper-btn { 
            background: #dc3545; 
            color: white; 
        }
        
        .delete-paper-btn:hover { 
            background: #c82333; 
        }

        /* تحسينات لقائمة اختيار الورق - خلفية بيضاء ونص داكن */
        .paper-select-container { 
            position: relative; 
        }
        
        .paper-select-container .select-field { 
            background: white; 
            color: #333; 
            padding-right: 45px; 
            border: 2px solid #3b82f6;
        }
        
        .paper-select-info { 
            position: absolute; 
            left: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(59, 130, 246, 0.9); 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-size: 1rem;
            color: white;
        }
        
        /* تعديلات للشاشات الصغيرة */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: stretch;
                font-size: 16px;
            }
            
            .container { 
                padding: 15px; 
                margin: 5px 0;
                border-radius: 12px;
            }
            
            .header { 
                margin-bottom: 20px; 
                padding: 20px; 
            }
            
            .header h1 { 
                font-size: 2rem; 
            }
            
            .section { 
                margin-bottom: 20px; 
                padding: 15px; 
            }
            
            .section-title { 
                font-size: 1.5rem; 
                margin-bottom: 15px; 
            }
            
            .formula-buttons { 
                gap: 8px;
            }
            
            .formula-btn {
                padding: 12px 18px;
                font-size: 1.2rem;
                min-width: 100px;
            }
            
            .input-field, .btn, .formula-btn, .form-count-btn, .no-form-btn { 
                padding: 16px; 
                font-size: 1.1rem; 
            }
            
            .paper-types-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px;
            }
            
            .paper-type-card {
                padding: 15px;
                min-height: 130px;
            }
            
            .paper-select-info { 
                position: static; 
                transform: none; 
                margin-top: 8px; 
                display: inline-block;
            }
            
            .result-value {
                font-size: 2rem;
            }

            .form-count-btn, .no-form-btn {
                padding: 10px 16px;
                font-size: 1rem;
                min-width: 50px;
                max-width: 70px;
            }

            .no-form-btn {
                max-width: 100px;
                flex: 0 0 auto;
            }
        }
        
        /* تعديلات للشاشات الصغيرة جداً (الهواتف الصغيرة) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                font-size: 16px;
            }
            
            .container {
                padding: 12px;
            }
            
            .header {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .section {
                padding: 12px;
            }
            
            .section-title {
                font-size: 1.4rem;
            }
            
            .formula-buttons {
                gap: 6px;
            }
            
            .formula-btn {
                padding: 10px 15px;
                font-size: 1.1rem;
                min-width: 90px;
            }
            
            .paper-types-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .paper-type-card {
                padding: 12px;
                min-height: 120px;
            }
            
            .input-group label {
                font-size: 1.2rem;
            }
            
            .btn {
                padding: 16px;
                font-size: 1.2rem;
            }
            
            .result-value {
                font-size: 1.8rem;
            }
            
            .paper-actions {
                flex-direction: column;
                gap: 5px;
            }
            
            .paper-action-btn {
                width: 100%;
                padding: 8px 12px;
            }

            .form-count-btn, .no-form-btn {
                padding: 8px 12px;
                font-size: 0.9rem;
                min-width: 45px;
                max-width: 60px;
            }

            .no-form-btn {
                max-width: 90px;
                flex: 0 0 auto;
            }
        }
        
        /* تعديلات للوضع الأفقي على الهواتف */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: flex-start;
                padding: 10px;
            }
            
            .container {
                max-height: 90vh;
                overflow-y: auto;
            }
            
            .section {
                margin-bottom: 15px;
                padding: 15px;
            }
            
            .input-group {
                margin-bottom: 15px;
            }
        }
        
        /* تحسينات إضافية للشاشات الكبيرة */
        @media (min-width: 1200px) {
            .container {
                max-width: 1100px;
            }
        }
        
        /* منع التكبير المفرط على الهواتف */
        @media (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>مطبعة الإسراء</h1>
        </header>

        <!-- قسم إدارة أنواع الورق - تم نقله للأعلى -->
        <div class="section">
            <h2 class="section-title">إدارة أنواع الورق</h2>
            
            <div class="add-formula-form">
                <div class="input-group">
                    <label for="paperName">اسم نوع الورق:</label>
                    <input type="text" id="paperName" class="input-field" placeholder="مثال: أصل+1">
                </div>
                <div class="input-group">
                    <label for="paperPriceInput">سعر الورقة:</label>
                    <input type="number" id="paperPriceInput" class="input-field" placeholder="مثال: 9.90" step="0.01">
                </div>
                <button class="btn add-btn" id="addPaperBtn">أضف نوع ورق جديد</button>
            </div>

            <h3 class="sub-title">أنواع الورق المتاحة</h3>
            <div class="paper-types-grid" id="paperTypesContainer">
                <!-- بطاقات أنواع الورق ستتم إضافتها هنا بواسطة الجافاسكريبت -->
            </div>
        </div>

        <!-- قسم إدارة المعادلات -->
        <div class="section">
            <h2 class="section-title">إدارة المعادلات</h2>
            
            <div class="add-formula-form">
                <div class="input-group">
                    <label for="formulaName">اسم المعادلة الجديدة (الاختصار):</label>
                    <input type="text" id="formulaName" class="input-field" placeholder="مثال: 2*11 أو ربع فرخ">
                </div>
                <div class="input-group">
                    <label for="formulaValue">المعادلة الحقيقية:</label>
                    <input type="text" id="formulaValue" class="input-field" placeholder="مثال: (50 / 2) / 11">
                </div>
                <button class="btn add-btn" id="addFormulaBtn">أضف معادلة جديدة</button>
            </div>

            <h3 class="sub-title">المعادلات المحفوظة</h3>
            <div class="formula-buttons" id="formulaButtonsContainer">
                <!-- الأزرار ستتم إضافتها هنا بواسطة الجافاسكريبت -->
            </div>
        </div>

        <!-- قسم الحسابات -->
        <div class="section">
            <h2 class="section-title">الحسابات</h2>
            <div class="input-group">
                <label for="selectedFormula">المعادلة المختارة:</label>
                <input type="text" id="selectedFormula" class="input-field" readonly placeholder="اختر معادلة من الأعلى">
            </div>
            <div class="input-group">
                <label for="numberOfBooks">عدد الدفاتر:</label>
                <input type="number" id="numberOfBooks" class="input-field" placeholder="أدخل عدد الدفاتر" value="0" step="0.01">
            </div>

            <!-- بداية: قسم اختيار عدد الفورم (معدل) -->
            <div class="input-group">
                <label>عدد الفورم (اختر "بدون" إذا لم ترد استخدام فورم):</label>
                <div class="form-count-wrapper" id="formCountWrapper">
                    <!-- سيتم إنشاء الأزرار بواسطة الجافاسكريبت -->
                </div>
            </div>
            <!-- نهاية: قسم اختيار عدد الفورم -->

            <button class="btn" onclick="calculateFormula()">احسب عدد الورق</button>
            <div class="result">
                <h3>عدد الورق:</h3>
                <div class="result-value" id="formulaResult">0.00 ورقة</div>
                <div class="formula-display" id="formulaDisplay">لم يتم اختيار معادلة</div>
            </div>
        </div>

        <!-- قسم التكاليف الإضافية -->
        <div class="section">
            <h2 class="section-title">التكاليف الإضافية</h2>
            <div class="input-group">
                <label for="paperTypeSelect">نوع الورق:</label>
                <div class="paper-select-container">
                    <select id="paperTypeSelect" class="select-field">
                        <option value="">اختر نوع الورق</option>
                        <!-- سيتم تعبئة الخيارات بواسطة الجافاسكريبت -->
                    </select>
                    <div class="paper-select-info" id="selectedPaperPrice">السعر: 0.00 جنيه</div>
                </div>
            </div>
            <div class="input-group">
                <label for="numberOfPapers">عدد الورق:</label>
                <input type="number" id="numberOfPapers" class="input-field" value="0" step="0.01">
            </div>
            <div class="input-group">
                <label for="paperPrice">سعر الورق (للورقة):</label>
                <input type="number" id="paperPrice" class="input-field" value="0" step="0.01">
            </div>
            <div class="input-group"><label for="numberOfZinc">عدد الزنكات:</label><input type="number" id="numberOfZinc" class="input-field" value="0" step="0.01"></div>
            <div class="input-group"><label for="numberOfPrints">عدد التراجات:</label><input type="number" id="numberOfPrints" class="input-field" value="0" step="0.01"></div>
            <div class="input-group"><label for="bindingPrice">سعر التجليد:</label><input type="number" id="bindingPrice" class="input-field" value="0" step="0.01"></div>
            <button class="btn" onclick="calculateTotal()">احسب الإجمالي الكلي</button>
            <div class="result">
                <h3>الإجمالي الكلي:</h3>
                <div class="result-value" id="totalResult">0.00 جنيه</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ===================================================================
            // =================  1. تحديد كل العناصر المهمة في الصفحة =================
            // ===================================================================
            const formulaNameInput = document.getElementById('formulaName');
            const formulaValueInput = document.getElementById('formulaValue');
            const addFormulaBtn = document.getElementById('addFormulaBtn');
            const formulaButtonsContainer = document.getElementById('formulaButtonsContainer');
            const selectedFormulaInput = document.getElementById('selectedFormula');
            
            // عناصر إدارة الورق
            const paperNameInput = document.getElementById('paperName');
            const paperPriceInput = document.getElementById('paperPriceInput');
            const addPaperBtn = document.getElementById('addPaperBtn');
            const paperTypesContainer = document.getElementById('paperTypesContainer');
            const paperTypeSelect = document.getElementById('paperTypeSelect');
            const paperPriceField = document.getElementById('paperPrice');
            const selectedPaperPrice = document.getElementById('selectedPaperPrice');

            // عناصر عدد الفورم (جديد)
            const formCountWrapper = document.getElementById('formCountWrapper');
            let selectedFormCount = 1; // القيمة الافتراضية (بدون فورم)
            let isNoFormSelected = true; // لتتبع حالة الزر "بدون"

            // ===================================================================
            // =================  2. تعريف المعادلات الأساسية والثابتة =================
            // ===================================================================
            const baseFormulas = {
                '11*2': '(50 / 2) / 11',
                '20*30': '50 / 11',
                '11*4': '(50 / 4) / 11',
                '2*9': '(50 / 9) / 2',
                '9': '50 / 9',
                '9*4': '(50 / 9) / 4',
                '2*8': '(50 / 8) / 2',
                '8': '50 / 8',
                '4*8': '(50 / 8) / 4'
            };

            // أنواع الورق الأساسية
            const basePaperTypes = {
                'paper_base_1': {
                    name: 'أصل+1',
                    price: 9.90
                },
                'paper_base_2': {
                    name: 'أصل+2',
                    price: 13.40
                },
                'paper_base_3': {
                    name: 'أصل+3',
                    price: 16.90
                },
                'paper_base_4': {
                    name: 'أصل+4',
                    price: 20.40
                },
                'paper_base_5': {
                    name: 'أصل+5',
                    price: 23.90
                }
            };

            // متغيرات لحفظ الحالة
            let customFormulas = {};
            let paperTypes = {};
            let currentFormulaName = '';
            let allFormulas = {};

            // ===================================================================
            // =================  3. دوال إدارة المعادلات (حفظ، تحميل، عرض) =================
            // ===================================================================

            // دالة لحفظ المعادلات المخصصة فقط
            function saveCustomFormulas() {
                localStorage.setItem('savedCustomFormulas', JSON.stringify(customFormulas));
            }

            // دالة لتحميل المعادلات المخصصة ودمجها مع الأساسية
            function loadFormulas() {
                const saved = localStorage.getItem('savedCustomFormulas');
                if (saved) {
                    customFormulas = JSON.parse(saved);
                }
                // دمج المعادلات الأساسية والمخصصة في مكان واحد للعرض
                allFormulas = { ...baseFormulas, ...customFormulas };
                renderFormulaButtons();
            }

            // دالة لعرض كل أزرار المعادلات على الشاشة
            function renderFormulaButtons() {
                formulaButtonsContainer.innerHTML = '';
                // عرض المعادلات الأساسية أولاً
                for (const name in baseFormulas) {
                    createButton(name, false); // false = غير قابل للحذف
                }
                // عرض المعادلات المخصصة ثانيًا
                for (const name in customFormulas) {
                    createButton(name, true); // true = قابل للحذف
                }
            }

            // دالة لإنشاء زر معادلة (أساسي أو مخصص)
            function createButton(name, isDeletable) {
                const button = document.createElement('button');
                button.className = 'formula-btn';
                button.textContent = name;
                button.onclick = () => setFormula(name);

                // إضافة زر الحذف فقط للمعادلات المخصصة
                if (isDeletable) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '✕';
                    deleteBtn.style.cssText = `
                        background: #dc3545;
                        border: none;
                        color: white;
                        border-radius: 50%;
                        width: 28px;
                        height: 28px;
                        cursor: pointer;
                        margin-right: 8px;
                        font-size: 14px;
                        display: inline-flex;
                        align-items: center;
                        justify-content: center;
                    `;
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteFormula(name);
                    };
                    
                    // إنشاء حاوية للزر وزر الحذف
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = 'display: flex; align-items: center; margin: 5px;';
                    wrapper.appendChild(deleteBtn);
                    wrapper.appendChild(button);
                    
                    formulaButtonsContainer.appendChild(wrapper);
                } else {
                    // للمعادلات الأساسية، نضيف الزر مباشرة
                    formulaButtonsContainer.appendChild(button);
                }
            }

            // ===================================================================
            // =================  4. دوال إدارة أنواع الورق =================
            // ===================================================================

            // دالة لحفظ أنواع الورق
            function savePaperTypes() {
                localStorage.setItem('paperTypes', JSON.stringify(paperTypes));
            }

            // دالة لتحميل أنواع الورق
            function loadPaperTypes() {
                const saved = localStorage.getItem('paperTypes');
                if (saved) {
                    paperTypes = JSON.parse(saved);
                } else {
                    // إذا لم تكن هناك أنواع ورق محفوظة، نستخدم الأنواع الأساسية
                    paperTypes = { ...basePaperTypes };
                    savePaperTypes();
                }
                renderPaperTypes();
                updatePaperTypeSelect();
            }

            // دالة لعرض أنواع الورق
            function renderPaperTypes() {
                paperTypesContainer.innerHTML = '';
                
                for (const id in paperTypes) {
                    const paper = paperTypes[id];
                    createPaperCard(id, paper);
                }
            }

            // دالة لإنشاء بطاقة نوع ورق
            function createPaperCard(id, paper) {
                const card = document.createElement('div');
                card.className = 'paper-type-card';
                
                // معلومات الورق
                const nameDiv = document.createElement('div');
                nameDiv.className = 'paper-name';
                nameDiv.textContent = paper.name;
                
                const priceDiv = document.createElement('div');
                priceDiv.className = 'paper-price';
                priceDiv.textContent = `${paper.price.toFixed(2)} جنيه`;
                
                // أزرار التعديل والحذف
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'paper-actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'paper-action-btn edit-btn';
                editBtn.textContent = 'تعديل';
                editBtn.onclick = () => editPaperType(id);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'paper-action-btn delete-paper-btn';
                deleteBtn.textContent = 'حذف';
                deleteBtn.onclick = () => deletePaperType(id);
                
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);
                
                // تجميع كل العناصر
                card.appendChild(nameDiv);
                card.appendChild(priceDiv);
                card.appendChild(actionsDiv);
                
                paperTypesContainer.appendChild(card);
            }

            // دالة لتحديث قائمة اختيار أنواع الورق
            function updatePaperTypeSelect() {
                paperTypeSelect.innerHTML = '<option value="">اختر نوع الورق</option>';
                
                for (const id in paperTypes) {
                    const paper = paperTypes[id];
                    const option = document.createElement('option');
                    option.value = id;
                    // عرض اسم الورق فقط بدون السعر
                    option.textContent = paper.name;
                    paperTypeSelect.appendChild(option);
                }
            }

            // ===================================================================
            // =================  5. دوال التفاعل (إضافة، حذف، اختيار) =================
            // ===================================================================

            // دالة لإضافة معادلة مخصصة جديدة
            function addFormula() {
                const name = formulaNameInput.value.trim();
                const value = formulaValueInput.value.trim();

                if (!name || !value) {
                    alert('يرجى إدخال اسم ومعادلة.');
                    return;
                }
                if (baseFormulas[name]) {
                    alert('لا يمكن استخدام اسم معادلة أساسية. يرجى اختيار اسم آخر.');
                    return;
                }

                customFormulas[name] = value;
                saveCustomFormulas();
                loadFormulas(); // إعادة تحميل وعرض كل شيء

                formulaNameInput.value = '';
                formulaValueInput.value = '';
            }

            // دالة لحذف معادلة مخصصة فقط
            function deleteFormula(name) {
                if (confirm(`هل أنت متأكد من حذف معادلة "${name}"؟`)) {
                    delete customFormulas[name];
                    saveCustomFormulas();
                    loadFormulas(); // إعادة تحميل وعرض كل شيء
                    if (currentFormulaName === name) {
                        currentFormulaName = '';
                        selectedFormulaInput.value = '';
                    }
                }
            }

            // دالة لاختيار معادلة
            window.setFormula = function(name) {
                currentFormulaName = name;
                selectedFormulaInput.value = name;
                document.querySelectorAll('.formula-btn').forEach(btn => {
                    btn.classList.remove('selected');
                    if (btn.textContent === name) {
                        btn.classList.add('selected');
                    }
                });
            }

            // دالة لإضافة نوع ورق جديد
            function addPaperType() {
                const name = paperNameInput.value.trim();
                const price = parseFloat(paperPriceInput.value);

                if (!name || isNaN(price)) {
                    alert('يرجى إدخال اسم وسعر صحيحين لنوع الورق.');
                    return;
                }

                // إنشاء معرف فريد لنوع الورق
                const id = 'paper_' + Date.now();
                
                paperTypes[id] = {
                    name: name,
                    price: price
                };
                
                savePaperTypes();
                loadPaperTypes();
                
                // مسح الحقول
                paperNameInput.value = '';
                paperPriceInput.value = '';
            }

            // دالة لتعديل نوع ورق
            function editPaperType(id) {
                const paper = paperTypes[id];
                
                const newName = prompt('أدخل الاسم الجديد:', paper.name);
                if (newName === null) return; // المستخدم ألغى
                
                const newPrice = parseFloat(prompt('أدخل السعر الجديد:', paper.price));
                if (isNaN(newPrice)) {
                    alert('يرجى إدخال سعر صحيح.');
                    return;
                }
                
                paperTypes[id] = {
                    name: newName,
                    price: newPrice
                };
                
                savePaperTypes();
                loadPaperTypes();
                
                // إذا كان هذا النوع هو المختار حالياً، قم بتحديث السعر
                if (paperTypeSelect.value === id) {
                    paperPriceField.value = newPrice;
                    selectedPaperPrice.textContent = `السعر: ${newPrice.toFixed(2)} جنيه`;
                }
            }

            // دالة لحذف نوع ورق
            function deletePaperType(id) {
                if (confirm(`هل أنت متأكد من حذف نوع الورق "${paperTypes[id].name}"؟`)) {
                    delete paperTypes[id];
                    savePaperTypes();
                    loadPaperTypes();
                    
                    // إذا كان هذا النوع هو المختار حالياً، قم بإلغاء الاختيار
                    if (paperTypeSelect.value === id) {
                        paperTypeSelect.value = '';
                        paperPriceField.value = 0;
                        selectedPaperPrice.textContent = 'السعر: 0.00 جنيه';
                    }
                }
            }

            // ===================================================================
            // =================  6. دوال الحسابات (معدلة) =================
            // ===================================================================

            window.calculateFormula = function() {
                if (!currentFormulaName) {
                    alert('برجاء اختيار معادلة أولاً');
                    return;
                }
                const numberOfBooks = parseFloat(document.getElementById('numberOfBooks').value) || 0;
                const formulaString = allFormulas[currentFormulaName];
                try {
                    const result = eval(formulaString);
                    // القسمة على عدد الفورم المختار (1 إذا كان "بدون")
                    const finalResult = (result * numberOfBooks) / selectedFormCount;
                    document.getElementById('formulaResult').textContent = finalResult.toFixed(2) + ' ورقة';
                    let formText = (isNoFormSelected) ? 'بدون فورم' : `${selectedFormCount} فورم`;
                    document.getElementById('formulaDisplay').textContent = 
                        `(${formulaString}) × ${numberOfBooks} / ${(isNoFormSelected ? '1' : selectedFormCount)} = ${finalResult.toFixed(2)} ورقة (${formText})`;
                } catch (error) {
                    alert('خطأ في المعادلة المدخلة. يرجى مراجعتها.');
                    console.error("Formula Error:", error);
                }
            }

            window.calculateTotal = function() {
                const numberOfPapers = parseFloat(document.getElementById('numberOfPapers').value) || 0;
                const paperPrice = parseFloat(document.getElementById('paperPrice').value) || 0;
                const numberOfZinc = parseFloat(document.getElementById('numberOfZinc').value) || 0;
                const numberOfPrints = parseFloat(document.getElementById('numberOfPrints').value) || 0;
                const bindingPrice = parseFloat(document.getElementById('bindingPrice').value) || 0;
                const totalPaperCost = numberOfPapers * paperPrice;
                // التعديل: سعر الزنكة 60، وسعر التراج 100
                const totalZincCost = numberOfZinc * 60;
                const totalPrintCost = numberOfPrints * 100;
                const total = totalPaperCost + totalZincCost + totalPrintCost + bindingPrice;
                document.getElementById('totalResult').textContent = total.toFixed(2) + ' جنيه';
            }

            // ===================================================================
            // =================  7. دوال إدارة عدد الفورم (معدلة) =================
            // ===================================================================

            function initFormCountButtons() {
                formCountWrapper.innerHTML = '';

                // زر "بدون فورم"
                const noFormBtn = document.createElement('button');
                noFormBtn.className = 'no-form-btn selected-form'; // مختار افتراضياً
                noFormBtn.textContent = 'بدون';
                noFormBtn.dataset.value = '1';
                noFormBtn.onclick = function() {
                    // إزالة التحديد من جميع الأزرار
                    document.querySelectorAll('.form-count-btn, .no-form-btn').forEach(b => b.classList.remove('selected-form'));
                    this.classList.add('selected-form');
                    selectedFormCount = 1;
                    isNoFormSelected = true;
                };
                formCountWrapper.appendChild(noFormBtn);

                // أزرار 1 إلى 8
                for (let i = 1; i <= 8; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'form-count-btn';
                    if (i === 1) {
                        // الزر 1 سيكون غير محدد افتراضياً لأن "بدون" هو المختار
                        // لكننا نضيف نفس القيمة
                    }
                    btn.textContent = i;
                    btn.dataset.value = i;
                    btn.onclick = function() {
                        // إزالة التحديد من جميع الأزرار
                        document.querySelectorAll('.form-count-btn, .no-form-btn').forEach(b => b.classList.remove('selected-form'));
                        this.classList.add('selected-form');
                        selectedFormCount = parseInt(this.dataset.value);
                        isNoFormSelected = false;
                    };
                    formCountWrapper.appendChild(btn);
                }

                // تعيين القيمة الافتراضية
                selectedFormCount = 1;
                isNoFormSelected = true;
                // نترك زر "بدون" محدداً بالفعل (تمت إضافة class selected-form)
            }

            // ===================================================================
            // =================  8. ربط الأحداث والتشغيل الأولي =================
            // ===================================================================
            addFormulaBtn.addEventListener('click', addFormula);
            addPaperBtn.addEventListener('click', addPaperType);
            
            // عند اختيار نوع ورق، قم بتعبئة سعر الورق تلقائياً
            paperTypeSelect.addEventListener('change', function() {
                const selectedId = this.value;
                if (selectedId && paperTypes[selectedId]) {
                    const selectedPaper = paperTypes[selectedId];
                    paperPriceField.value = selectedPaper.price;
                    selectedPaperPrice.textContent = `السعر: ${selectedPaper.price.toFixed(2)} جنيه`;
                } else {
                    paperPriceField.value = 0;
                    selectedPaperPrice.textContent = 'السعر: 0.00 جنيه';
                }
            });
            
            // تحميل كل البيانات عند بدء تشغيل الصفحة
            loadFormulas();
            loadPaperTypes();
            initFormCountButtons(); // تهيئة أزرار عدد الفورم
        });
    </script>
</body>
</html>
